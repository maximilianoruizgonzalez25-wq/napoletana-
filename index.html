<!doctype html>
<html lang="es">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return customFetch || originalFetch;
            },
            set: function(newValue) {
              customFetch = newValue;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define customizable window.fetch:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Napoletana Trattoria & Pizzería - Sabor Auténtico</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
